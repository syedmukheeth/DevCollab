services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/devcollab
      CLIENT_ORIGIN: http://localhost:5173
      SOCKET_ORIGIN: http://localhost:5173
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: change_me_to_a_long_random_string
    depends_on:
      - mongo
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      # These are used at build time for Vite; for a production deployment you’d typically
      # generate a runtime config or serve behind a reverse proxy.
      VITE_API_BASE_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  mongo_data:

