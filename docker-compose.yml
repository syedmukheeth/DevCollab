services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: syncmeshforge
      POSTGRES_PASSWORD: syncmeshpassword
      POSTGRES_DB: syncmeshforge
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: syncmeshforge
      MINIO_ROOT_PASSWORD: syncmeshpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: "postgresql://syncmeshforge:syncmeshpassword@postgres:5432/syncmeshforge?schema=public"
      CLIENT_ORIGIN: http://localhost:5173
      SOCKET_ORIGIN: http://localhost:5173
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: change_me_to_a_long_random_string
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: syncmeshforge
      S3_SECRET_KEY: syncmeshpassword
      S3_BUCKET: syncmesh-forge-data
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
