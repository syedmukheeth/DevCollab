version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-syncmeshforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret}
      POSTGRES_DB: ${DB_NAME:-syncmeshforge_prod}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - syncmeshforge_net

  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-syncmeshforge}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-supersecret-minio}
    command: server /data
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - syncmeshforge_net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - syncmeshforge_net

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
      - redis
      - minio
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-syncmeshforge}:${DB_PASSWORD:-supersecret}@db:5432/${DB_NAME:-syncmeshforge_prod}?schema=public
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-syncmeshforge}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-supersecret-minio}
      CLIENT_ORIGIN: ${FRONTEND_URL:-https://syncmeshforge.com}
      SESSION_SECRET: ${SESSION_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "4000:4000"
    volumes:
      # Required for execution container spawning mapping (Docker-in-Docker via socket)
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devcollab_net
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  syncmeshforge_net:
    driver: bridge
